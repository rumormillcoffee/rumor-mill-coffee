name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deploy_attempt_1
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - id: deploy_attempt_2
        if: steps.deploy_attempt_1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - id: deploy_attempt_3
        if: steps.deploy_attempt_1.outcome == 'failure' && steps.deploy_attempt_2.outcome == 'failure'
        uses: actions/deploy-pages@v4
      - id: deployment
        if: always()
        run: |
          echo "page_url=${{ steps.deploy_attempt_1.outputs.page_url || steps.deploy_attempt_2.outputs.page_url || steps.deploy_attempt_3.outputs.page_url }}" >> "$GITHUB_OUTPUT"
